services:

  # ── Service discovery ────────────────────────────────────────────────────────
  # Single Consul agent in dev mode (single DC "dc1"). Attached to all three
  # networks so app containers in zoneN-net can register, and zone-envoy in
  # zoneN-net + global-net can resolve via Consul DNS on :8600.
  # See ADR §5 for the discovery contract.

  consul:
    image: hashicorp/consul:1.18
    container_name: consul
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8500:8500"       # HTTP API + UI
      - "8600:8600/udp"   # DNS (UDP)
      - "8600:8600/tcp"   # DNS (TCP)
    networks:
      global-net:
        ipv4_address: 172.30.0.5
      zone1-net:
        ipv4_address: 172.30.1.5
      zone2-net:
        ipv4_address: 172.30.2.5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8500/v1/status/leader || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s

  # ── Zone 1 apps (5 services × 1 instance each) ──────────────────────────────
  # Naming: container=service-<name>-<zone>-<n>, Consul service name=<name>,
  # tag=zone1|zone2. Labels enable label-based filtering by events-collector.

  service-a-zone1-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-a-zone1-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-a"
      - "gateway.zone=zone1"
    environment:
      - SERVICE_NAME=service-a
      - INSTANCE_NAME=service-a-zone1-1
      - ZONE=zone1
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone1-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  service-b-zone1-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-b-zone1-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-b"
      - "gateway.zone=zone1"
    environment:
      - SERVICE_NAME=service-b
      - INSTANCE_NAME=service-b-zone1-1
      - ZONE=zone1
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone1-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  service-c-zone1-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-c-zone1-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-c"
      - "gateway.zone=zone1"
    environment:
      - SERVICE_NAME=service-c
      - INSTANCE_NAME=service-c-zone1-1
      - ZONE=zone1
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone1-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  service-d-zone1-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-d-zone1-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-d"
      - "gateway.zone=zone1"
    environment:
      - SERVICE_NAME=service-d
      - INSTANCE_NAME=service-d-zone1-1
      - ZONE=zone1
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone1-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  service-e-zone1-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-e-zone1-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-e"
      - "gateway.zone=zone1"
    environment:
      - SERVICE_NAME=service-e
      - INSTANCE_NAME=service-e-zone1-1
      - ZONE=zone1
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone1-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  zone1-envoy:
    image: envoyproxy/envoy:v1.36.0
    container_name: zone1-envoy
    environment:
      # ENVOY_UID=0 tells the official entrypoint script to skip the
      # "chown /dev/stdout /dev/stderr" step, which fails in rootless Podman.
      # The script then does: exec envoy -c /etc/envoy/envoy.yaml
      - ENVOY_UID=0
    volumes:
      - ./envoy/zone1-envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      # FR-01: data-plane (10000) NOT exposed externally — all traffic must enter via global-envoy.
      # Admin API exposed only for Prometheus scraping (observability NFR).
      - "19001:9901"
    depends_on:
      service-a-zone1-1: { condition: service_healthy }
      service-b-zone1-1: { condition: service_healthy }
      service-c-zone1-1: { condition: service_healthy }
      service-d-zone1-1: { condition: service_healthy }
      service-e-zone1-1: { condition: service_healthy }
      consul:            { condition: service_healthy }
    networks:
      - global-net
      - zone1-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9901' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  # ── Zone 2 apps (5 services × 1 instance each) ──────────────────────────────

  service-a-zone2-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-a-zone2-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-a"
      - "gateway.zone=zone2"
    environment:
      - SERVICE_NAME=service-a
      - INSTANCE_NAME=service-a-zone2-1
      - ZONE=zone2
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone2-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  service-b-zone2-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-b-zone2-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-b"
      - "gateway.zone=zone2"
    environment:
      - SERVICE_NAME=service-b
      - INSTANCE_NAME=service-b-zone2-1
      - ZONE=zone2
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone2-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  service-c-zone2-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-c-zone2-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-c"
      - "gateway.zone=zone2"
    environment:
      - SERVICE_NAME=service-c
      - INSTANCE_NAME=service-c-zone2-1
      - ZONE=zone2
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone2-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  service-d-zone2-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-d-zone2-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-d"
      - "gateway.zone=zone2"
    environment:
      - SERVICE_NAME=service-d
      - INSTANCE_NAME=service-d-zone2-1
      - ZONE=zone2
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone2-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  service-e-zone2-1:
    build: { context: ., dockerfile: app/Dockerfile }
    container_name: service-e-zone2-1
    labels:
      - "gateway.component=app"
      - "gateway.service.name=service-e"
      - "gateway.zone=zone2"
    environment:
      - SERVICE_NAME=service-e
      - INSTANCE_NAME=service-e-zone2-1
      - ZONE=zone2
      - CONSUL_ADDR=consul:8500
      - CONFIG_FILE=/etc/service/config.json
      - OTLP_ENDPOINT=jaeger:4318
      - REDIS_URL=redis:6379
    volumes:
      - ./app/config/service.json:/etc/service/config.json:ro
    networks: [zone2-net]
    depends_on:
      consul: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  zone2-envoy:
    image: envoyproxy/envoy:v1.36.0
    container_name: zone2-envoy
    environment:
      - ENVOY_UID=0
    volumes:
      - ./envoy/zone2-envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      # FR-01: data-plane (10000) NOT exposed externally — all traffic must enter via global-envoy.
      - "19002:9901"
    depends_on:
      service-a-zone2-1: { condition: service_healthy }
      service-b-zone2-1: { condition: service_healthy }
      service-c-zone2-1: { condition: service_healthy }
      service-d-zone2-1: { condition: service_healthy }
      service-e-zone2-1: { condition: service_healthy }
      consul:            { condition: service_healthy }
    networks:
      - global-net
      - zone2-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9901' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  # ── Global entry point ───────────────────────────────────────────────────────

  global-envoy:
    image: envoyproxy/envoy:v1.36.0
    container_name: global-envoy
    environment:
      - ENVOY_UID=0
    volumes:
      - ./envoy/global-envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy/lua:/etc/envoy/lua:ro   # score Lua filter
    ports:
      - "10000:10000"   # main gateway (FR-01: единая точка входа)
      - "19000:9901"    # admin API for Prometheus
    depends_on:
      zone1-envoy:
        condition: service_healthy
      zone2-envoy:
        condition: service_healthy
    networks:
      - global-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9901' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  # ── Tracing & shared backends ────────────────────────────────────────────────
  # Jaeger uses the official all-in-one image; receives OTLP HTTP from apps
  # and traffic-gen.

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP
    networks: [global-net, zone1-net, zone2-net]

  # Redis carries cross-DC routing-hints pub/sub between control-plane and apps.
  # No persistence — pub/sub messages are ephemeral by design.
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save "" --appendonly no
    ports: ["6379:6379"]
    networks: [global-net, zone1-net, zone2-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  # ── Support services ────────────────────────────────────────────────────────
  # All three start as "sleep infinity" containers so the compose stack is
  # complete and ports are reserved. They are NOT healthchecked here — task
  # owners add proper healthchecks together with the real code.

  events-collector:
    build: { context: ., dockerfile: cmd/events-collector/Dockerfile }
    container_name: events-collector
    ports: ["9100:9100"]
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks: [global-net]

  ml-analyzer:
    build: { context: ., dockerfile: cmd/ml-analyzer/Dockerfile }
    container_name: ml-analyzer
    ports: ["9200:9200"]
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    networks: [global-net]
    depends_on:
      prometheus: { condition: service_started }

  control-plane:
    build: { context: ., dockerfile: cmd/control-plane/Dockerfile }
    container_name: control-plane
    ports: ["9300:9300"]
    environment:
      - ML_URL=http://ml-analyzer:9200
      - REDIS_URL=redis:6379
    networks: [global-net]
    depends_on:
      ml-analyzer: { condition: service_started }
      redis:       { condition: service_healthy }

  # ── Monitoring stack ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    networks:
      - global-net
    depends_on:
      global-envoy:
        condition: service_healthy
      zone1-envoy:
        condition: service_healthy
      zone2-envoy:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --web.listen-address=:9093
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - global-net

  grafana:
    image: grafana/grafana:11.6.1
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/traffic-geo.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - global-net
    depends_on:
      - prometheus

  # ── Tools (profile: tools) ───────────────────────────────────────────────────
  # Run with:  docker compose --profile tools run --rm traffic-gen [flags]
  #            docker compose --profile tools run --rm failure-runner zone1-full

  traffic-gen:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: cmd/traffic-gen/Dockerfile
    environment:
      - OTLP_ENDPOINT=jaeger:4318
    networks:
      - global-net
    depends_on:
      global-envoy:
        condition: service_healthy

  failure-runner:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: cmd/failure-runner/Dockerfile
    # Mount the container socket so failure-runner can stop/start sibling containers.
    # Docker:          /var/run/docker.sock  (default)
    # Podman rootless: set DOCKER_SOCKET in .env to point to podman socket, e.g.:
    #   DOCKER_SOCKET=/run/user/1000/podman/podman.sock
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    networks:
      - global-net
    depends_on:
      global-envoy:
        condition: service_healthy

networks:
  global-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  zone1-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.1.0/24
  zone2-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.2.0/24
