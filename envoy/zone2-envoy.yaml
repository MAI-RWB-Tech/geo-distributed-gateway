static_resources:
  listeners:
    - name: listener_zone2
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: zone2_ingress
                route_config:
                  name: zone2_route
                  virtual_hosts:
                    - name: zone2_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: app_zone2_cluster
                            retry_policy:
                              retry_on: "connect-failure,refused-stream,gateway-error,reset"
                              num_retries: 2
                              per_try_timeout: 2s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: app_zone2_cluster
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      health_checks:
        - timeout: 1s
          interval: 5s
          unhealthy_threshold: 2
          healthy_threshold: 1
          http_health_check:
            path: "/health"
      outlier_detection:
        consecutive_5xx: 3
        interval: 5s
        base_ejection_time: 15s
        max_ejection_percent: 100
      load_assignment:
        cluster_name: app_zone2_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: app-zone2-1
                      port_value: 8080
              - endpoint:
                  address:
                    socket_address:
                      address: app-zone2-2
                      port_value: 8080

admin:
  access_log_path: /tmp/admin_zone2.log
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
